        <h2>Sık Sorulan Sorular</h2>

        <h3>Vadeli mevduat net getiri nasıl hesaplanır?</h3>
        <p>
          Net getiri, brüt faiz tutarından stopaj kesintisi düşülerek hesaplanır. Brüt formül:
          Anapara × Faiz Oranı × (Vade/365). Net: Brüt − Stopaj.
        </p>

        <h3>32 günlük mevduat mı 92 günlük mevduat mı daha avantajlı?</h3>
        <p>
          Avantaj bankanın sunduğu faiz oranına ve vade boyunca uygulanacak stopaj oranına göre değişir.
          Kısa vadede esneklik, daha uzun vadede farklı kampanya/koşullar görülebilir.
        </p>

        <h3>Stopaj oranı kaçtır?</h3>
        <p>
          TL vadeli mevduatta stopaj oranı vadeye göre değişebilir. 180 güne kadar %17,5; 181–365 gün arası %15;
          1 yıl üzeri %10 uygulanabilir.
        </p>
